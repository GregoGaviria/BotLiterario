<div class="chat-container">
    <div class="chat-header">
        <button class="back-button" onclick="window.location.href='main.html'">← Back to Main</button>
        <h1>🎧 Audio Chat</h1>
        <p>Ask me about the call</p>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="message bot">
            hola, soy tu asistente virtual, preguntame lo que quieras con respecto a el audio
        </div>
    </div>

    <form hx-post="/prompt" hx-target="#chat-messages" hx-swap="beforeend" hx-on::after-request="this.reset()">
        <div class="input-group">
            <input type="text" name="prompt" placeholder="Ask me about the call recording..." autocomplete="off">
            <button type="submit">Send</button>
        </div>
    </form>
</div>
